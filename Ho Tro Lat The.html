<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lật Thẻ Play Together</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: "Segoe UI", sans-serif;
        background: url("images/background.png") center/cover no-repeat fixed;
        min-height: 100vh;
        text-align: center;
      }

      h1 {
        color: white;
        margin: 20px 0;
        font-size: 42px;
        text-shadow: 0 3px 10px rgba(0,0,0,0.4);
      }

      .control { margin-bottom: 25px; }

      input {
        width: 80px;
        height: 45px;
        border-radius: 10px;
        font-size: 20px;
        text-align: center;
        border: none;
      }

      button {
        padding: 12px 22px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-size: 18px;
        margin: 5px;
      }

      .create { background: #2ecc71; color: white; }
      .reset { background: #e74c3c; color: white; }

      .toolbar {
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
        margin-bottom: 30px;
      }

      .icon {
        width: 70px;
        height: 90px;
        background: white;
        border-radius: 18px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        border: 4px solid transparent;
      }

      .icon img {
        width: 90px;
        height: 90px;
        object-fit: contain;
      }

      .selected { border: 4px solid #ff4da6; }

      .board-container {
        display: none;
        width: max-content;
        margin: 20px auto;
        padding: 25px;
        background: rgba(70,120,220,0.3);
        backdrop-filter: blur(6px);
        border-radius: 25px;
      }

      .board {
        display: grid;
        gap: 10px;
      }

      .card {
        width: 70px;
        height: 90px;
        background: url("images/card-back.png") center/cover;
        border-radius: 18px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .card.drag-over {
        outline: 3px dashed #ff4da6;
      }
    </style>
  </head>

  <body>
    <h1>Play Together</h1>

    <div class="control">
      Hàng: <input type="number" id="rows" value="6">
      Cột: <input type="number" id="cols" value="12">
      <button class="create" onclick="createBoard()">Create</button>
      <button class="reset" onclick="resetBoard()">Reset</button>
    </div>

    <div class="toolbar">

      <div class="icon" draggable="true"
           onclick="selectIcon('images/sun.png', this)"
           ondragstart="dragIcon('images/sun.png', event)">
        <img src="images/sun.png">
      </div>

      <div class="icon" draggable="true"
           onclick="selectIcon('images/lightning.png', this)"
           ondragstart="dragIcon('images/lightning.png', event)">
        <img src="images/lightning.png">
      </div>

      <div class="icon" draggable="true"
           onclick="selectIcon('images/hint.png', this)"
           ondragstart="dragIcon('images/hint.png', event)">
        <img src="images/hint.png">
      </div>

      <div class="icon" draggable="true"
           onclick="selectIcon('images/chance.png', this)"
           ondragstart="dragIcon('images/chance.png', event)">
        <img src="images/chance.png">
      </div>

      <div class="icon" draggable="true"
           onclick="selectIcon('images/coin.png', this)"
           ondragstart="dragIcon('images/coin.png', event)">
        <img src="images/coin.png">
      </div>

      <div class="icon" draggable="true"
           onclick="selectIcon('', this)"
           ondragstart="dragIcon('', event)">
        ❌
      </div>

    </div>

    <div class="board-container" id="boardContainer">
      <div id="board" class="board"></div>
    </div>

    <script>
      let currentIcon = "";
      let dragIconData = "";

      function selectIcon(icon, el) {
        currentIcon = icon;
        document.querySelectorAll(".icon").forEach(i=>i.classList.remove("selected"));
        el.classList.add("selected");
      }

function dragIcon(icon, e) {
  dragIconData = icon;

  // tạo ảnh trong suốt để ẩn ghost
  const img = new Image();
  img.src =
    "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=";

  e.dataTransfer.setDragImage(img, 0, 0);
}

      function createBoard() {
        const rows = +document.getElementById("rows").value;
        const cols = +document.getElementById("cols").value;

        boardContainer.style.display = "block";
        board.innerHTML = "";
        board.style.gridTemplateColumns = `repeat(${cols},70px)`;

        for (let i = 0; i < rows * cols; i++) {
          const card = document.createElement("div");
          card.className = "card";

          // CLICK
          card.onclick = () => {
            card.innerHTML = currentIcon ? `<img src="${currentIcon}">` : "";
            saveBoard();
          };

          // DRAG DROP
          card.ondragover = e => e.preventDefault();

          card.ondragenter = () => card.classList.add("drag-over");
          card.ondragleave = () => card.classList.remove("drag-over");

          card.ondrop = () => {
            card.classList.remove("drag-over");
            card.innerHTML = dragIconData ? `<img src="${dragIconData}">` : "";
            saveBoard();
          };

          board.appendChild(card);
        }

        loadBoard();
      }

      function saveBoard() {
        const data = [];
        document.querySelectorAll(".card").forEach(c=>{
          const img = c.querySelector("img");
          data.push(img ? img.src : "");
        });
        localStorage.setItem("playTogetherBoard", JSON.stringify(data));
      }

      function loadBoard() {
        const data = JSON.parse(localStorage.getItem("playTogetherBoard"));
        if (!data) return;

        document.querySelectorAll(".card").forEach((c,i)=>{
          if (data[i]) c.innerHTML = `<img src="${data[i]}">`;
        });
      }

      function resetBoard() {
        localStorage.removeItem("playTogetherBoard");
        document.querySelectorAll(".card").forEach(c=>c.innerHTML="");
      }
    </script>
  </body>
</html>
